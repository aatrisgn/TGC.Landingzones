
# .github/workflows/build.yml in shared repo
name: Deploy Scaleway Terraform

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      applyTF:
        required: true
        type: string
      var_file_path:
        required: true
        type: string
      state_key:
        required: true
        type: string

    secrets:
      organization_id:
        required: true
        type: string
      deployment_access_key:
        required: true
        type: string
      deployment_secret_access_key:
        required: true
        type: string
      state_access_key:
        required: true
        type: string
      state_secret_access_key:
        required: true
        type: string
      state_bucket_name:
        required: true
        type: string

jobs:
  build_job:
    runs-on: ubuntu-latest
    name: Deploy infrastructure
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }} #./terraform/infrastructure
    
    env:
      SCW_ACCESS_KEY: ${{ inputs.deployment_access_key }} # "${{ secrets.ASGERTHYREGODDK_PRD_DEPLOYMENT_ACCESS_KEY }}"
      SCW_SECRET_KEY: ${{ inputs.deployment_secret_access_key }} # "${{ secrets.ASGERTHYREGODDK_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    steps:
    - uses: actions/checkout@v3

    - name: Install Terraform
      run: bash "${{ github.workspace }}/.github/scripts/install_terraform.sh" 

    - name: Terraform Fmt
      run: terraform fmt -check

    - name: Terraform Init
      run: |
        terraform init \
        -backend-config=access_key="${{ inputs.state_access_key }}" \
        -backend-config=secret_key="${{ inputs.state_secret_access_key }}" \
        -backend-config=bucket="${{ inputs.state_bucket_name }}" \
        -backend-config=key="${{ inputs.state_key }}"
        
    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      id: plan
      run: terraform plan -input=false -var-file="${{ inputs.var_file_path }}" -var=organization_id="${{ inputs.organization_id }}" -out=tfplan

    - name: Terraform Apply
      if: ${{ inputs.applyTF == 'true' }}
      run: terraform apply -auto-approve tfplan